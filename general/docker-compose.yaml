
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: asguard
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: general_engine
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
volumes:
  postgres_data: